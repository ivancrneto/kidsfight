# Adapted from izapp's .pre-commit-config.yaml — generic hygiene hooks.
# Run once locally: `pip install pre-commit && pre-commit install`
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
